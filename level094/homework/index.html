<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="road">
        <div class="line"></div>
        
        <div class="traffic-box">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>

        <div class="car">
            <div class="sirens">
                <div class="siren red-siren"></div>
                <div class="siren blue-siren"></div>
            </div>
            <img src="car.png" class="car-body">
            <img src="wheel.png" class="wheel wheel1">
            <img src="wheel.png" class="wheel wheel2">
        </div>

        <img src="human.png" class="human">
        <img src="traffic.png" class="traffic">
    </div>
</body>
</html>
